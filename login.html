<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hajj Platform</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
   
    <nav>
        <div class="container">
            <a href="index.html" class="logo">🕌 Hajj Platform</a>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="results.html">Results</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="signup.html">Sign Up</a></li>
            </ul>
        </div>
    </nav>

    
    <header>
        <div class="container">
            <h1>Login to Your Account</h1>
            <p>Access your Hajj Platform profile</p>
        </div>
    </header>

 
    <main>
        <div class="container">
            <div class="form-container">
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            required 
                            placeholder="Enter your email address"
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            required 
                            placeholder="Enter your password"
                        >
                    </div>

                    <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                        <label style="display: flex; align-items: center; margin: 0;">
                            <input type="checkbox" id="remember" name="remember" style="width: auto; margin-right: 0.5rem;">
                            Remember me
                        </label>
                        <a href="#" style="color: var(--primary-color); text-decoration: none;">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block" style="margin-top: 2rem;">Login</button>
                </form>

                <div style="text-align: center; margin-top: 2rem;">
                    <p>Don't have an account? <a href="signup.html" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Sign up here</a></p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Hajj Platform. All rights reserved.</p>
            <p>For support, contact us at: support@hajjplatform.com</p>
        </div>
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if(email && password) {
                alert('Login successful! Redirecting to user dashboard...');
                
                window.location.href = 'user-space/index.html';
            }
        });
    </script>
</body>
</html>
